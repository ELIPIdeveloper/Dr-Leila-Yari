<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دکتر لیلا یاری | دکتری پیراپزشکی گرایش پوست و مو</title>

    <style>
        :root {
            --primary: #0d9488;
            --primary-light: #ccfbf1;
            --secondary: #0f766e;
            --dark: #1e293b;
            --gray-text: #475569;
            --bg-body: #fafaf9;
            --bg-card: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--dark);
            line-height: 1.8;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: bold;
            color: var(--secondary);
        }

        nav a {
            margin: 0 12px;
            text-decoration: none;
            color: var(--gray-text);
        }

        nav a:hover {
            color: var(--primary);
        }

        .btn-contact-top {
            background: var(--primary);
            color: #fff;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .bio-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
        }

        .image-placeholder img,
        .poster-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .image-placeholder {
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            background: #eee;
        }

        .bio-info h1 {
            color: var(--secondary);
        }

        .bio-info h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .section-title {
            margin: 30px 0 20px;
            font-size: 22px;
            border-right: 4px solid var(--primary);
            padding-right: 10px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .poster-box {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
        }

        .poster-placeholder {
            aspect-ratio: 4/5;
            overflow: hidden;
            border-radius: 10px;
            background: #eee;
        }

        .contact-section {
            margin-top: 40px;
            background: var(--secondary);
            color: #fff;
            padding: 40px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--gray-text);
        }

        @media(max-width:768px){
            .bio-section,
            .contact-section{
                grid-template-columns:1fr;
            }

            .media-grid{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">کلینیک دکتر لیلا یاری</div>
    <nav>
        <a href="#bio">بیوگرافی</a>
        <a href="#books">کتاب‌ها</a>
        <a href="#posters">پوسترها</a>
        <a href="#contact">تماس</a>
    </nav>
    <a class="btn-contact-top" href="tel:09387501473">تماس</a>
</header>

<div class="container">

    <section id="bio" class="bio-section">
        <div class="image-placeholder">
            <img src="images/1.png" alt="doctor">
        </div>

        <div class="bio-info">
            <h1>دکتر لیلا یاری</h1>
            <h2>دکتری پیراپزشکی پوست و مو</h2>
            <p>
                متخصص پوست و مو با رویکرد علمی و مراقبت‌های نوین.
            </p>
        </div>
    </section>

    <h3 id="books" class="section-title">کتاب‌ها</h3>

    <section class="books-grid">
        <div class="book-card">
            <h4>جلد اول</h4>
            <p>انواع جوش‌ها</p>
        </div>

        <div class="book-card">
            <h4>جلد دوم</h4>
            <p>مراقبت پوست</p>
        </div>
    </section>

    <h3 id="posters" class="section-title">پوسترها</h3>

    <section class="media-grid">
        <div class="poster-box">
            <div class="poster-placeholder">
                <img src="images/2.png" alt="poster1">
            </div>
        </div>

        <div class="poster-box">
            <div class="poster-placeholder">
                <img src="images/3.png" alt="poster2">
            </div>
        </div>
    </section>

    <section id="contact" class="contact-section">
        <div>
            <h3>تماس</h3>
            <p>09387501473</p>
            <p>تهران، پاسداران</p>
        </div>
    </section>

</div>

<footer>
    © کلینیک دکتر لیلا یاری
</footer>

</body>
</html>
